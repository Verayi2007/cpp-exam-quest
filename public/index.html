<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>C++ 期末闯关 IDE</title>
    <link rel="stylesheet" href="./styles.css?v=20260531-account2">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="关卡列表">
        <div class="brand">
          <div class="brand-mark">C++</div>
          <div>
            <h1>期末闯关 IDE</h1>
            <p>18 关，两天冲刺版</p>
          </div>
        </div>
        <div class="progress-panel">
          <div>
            <span id="progressText">0 / 18</span>
            <small>已通过</small>
          </div>
          <div class="bar"><span id="progressBar"></span></div>
        </div>
        <section class="account-panel" aria-label="账号同步">
          <div class="account-meta">
            <strong id="accountName">访客模式</strong>
            <span id="syncState">本机保存</span>
          </div>
          <form id="accountForm" class="account-form">
            <input id="usernameInput" name="username" type="text" autocomplete="username" placeholder="账号">
            <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="密码">
            <div class="account-actions">
              <button id="loginBtn" class="secondary" type="submit">登录</button>
              <button id="registerBtn" class="secondary" type="button">注册</button>
            </div>
          </form>
          <button id="logoutBtn" class="text-button" type="button" hidden>退出登录</button>
        </section>
        <nav id="levelList" class="level-list"></nav>
        <div class="sidebar-pager" aria-label="关卡翻页">
          <button id="prevPageBtn" class="icon-button" type="button" title="上一页" aria-label="上一页">‹</button>
          <span id="pageText">1 / 3</span>
          <button id="nextPageBtn" class="icon-button" type="button" title="下一页" aria-label="下一页">›</button>
        </div>
        <button id="resetAllBtn" class="text-button" type="button">重置闯关进度</button>
      </aside>

      <main class="main">
        <section class="topbar">
          <div>
            <div id="source" class="source"></div>
            <h2 id="title"></h2>
          </div>
          <div class="status-pill" id="statusPill">未提交</div>
        </section>

        <section class="workspace">
          <section class="problem">
            <div class="section-heading">题目原文摘录</div>
            <p id="task"></p>
            <dl class="io-grid">
              <div>
                <dt>输入</dt>
                <dd id="inputSpec"></dd>
              </div>
              <div>
                <dt>输出</dt>
                <dd id="outputSpec"></dd>
              </div>
            </dl>
            <div class="section-heading">知识点</div>
            <p id="concept"></p>
            <div class="actions">
              <button id="hintBtn" class="secondary" type="button">提示</button>
              <button id="answerBtn" class="secondary" type="button">正确答案</button>
              <button id="resetCodeBtn" class="secondary" type="button">清空本关代码</button>
            </div>
            <div id="hintBox" class="hint-box" hidden></div>
          </section>

          <section class="ide">
            <div class="editor-toolbar">
              <span>main.cpp</span>
              <span id="autosave">自动保存</span>
            </div>
            <div class="editor-shell">
              <div id="errorLayer" class="error-layer" aria-hidden="true"></div>
              <div id="monacoEditor" class="monaco-editor-host" aria-label="C++ 代码编辑器"></div>
              <textarea id="editor" spellcheck="false" aria-label="C++ 代码编辑器"></textarea>
            </div>
            <div class="runbar">
              <button id="runBtn" class="primary" type="button">提交运行</button>
              <span id="runState">等待提交</span>
            </div>
          </section>
        </section>

        <section class="console" aria-live="polite">
          <div class="section-heading">判题反馈</div>
          <pre id="consoleOutput">写完代码后点击“提交运行”。通过后会自动解锁下一关。</pre>
        </section>
      </main>
    </div>

    <div id="finishDialog" class="finish" hidden>
      <div class="finish-panel">
        <h2>18 关全部通关</h2>
        <p>你已经把这套期末高频题的核心骨架刷完了。祝你期末考试成功，稳稳拿下。</p>
        <button id="closeFinishBtn" class="primary" type="button">继续复盘</button>
      </div>
    </div>

    <div id="answerDialog" class="answer-dialog" hidden>
      <section class="answer-panel" role="dialog" aria-modal="true" aria-labelledby="answerTitle">
        <div class="answer-header">
          <div>
            <div class="source">只读参考答案</div>
            <h2 id="answerTitle">正确答案</h2>
          </div>
          <button id="closeAnswerBtn" class="icon-button" type="button" aria-label="关闭正确答案" title="关闭">×</button>
        </div>
        <p>看懂以后请关闭弹窗，回到编辑器亲手敲一遍。查看答案不会自动解锁关卡。</p>
        <pre id="answerCode"></pre>
      </section>
    </div>

    <script src="./challenges.js?v=20260531-account2"></script>
    <script src="./solutions.js?v=20260531-account2"></script>
    <script src="./remote-judge.js?v=20260531-account2"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.min.js"></script>
    <script src="./app.js?v=20260531-account2"></script>
  </body>
</html>
